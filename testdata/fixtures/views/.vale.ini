StylesPath = ../../styles
MinAlertLevel = suggestion

[formats]
py = md

[*.json]
BasedOnStyles = Vale

View = GitHubActions

[*.java]
vale.Annotations = YES

View = Strings

[*.py]
vale.Annotations = YES

View = Python

[*.{yml,yaml}]
BasedOnStyles = Vale, Scopes

[API.yml]
View = OpenAPI

[Petstore.yaml]
View = Petstore

[Rule.yml]
View = Vale

[newline.yml]
View = NewLine

[ansible.yml]
BasedOnStyles = Vale, Scopes

View = Ansible
